<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grow A Garden 2 Page</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<img src="root/pic/logo.png" class="logo">

<div id="cycleTimer" class="cycle-timer"></div>

<div class="textpanel">
    This is a Gag 2 website one of the first<br>
    it will help with everything soon<br><br>
    <strong>TEAMGREENBEAN</strong>
</div>

<script>

// ===== CYCLE SETTINGS =====
const DAY = 450;
const NIGHT = 120;
const TOTAL = DAY + NIGHT;

/*
🔥 RIGHT NOW CONDITION:
Night starts in 90 seconds (1:30)

That means we set cycle so:
we are at (TOTAL - 90) seconds into the cycle.
*/

// start time shifted so current position = TOTAL - 90
const cycleStart =
    Date.now() - ((TOTAL - 90) * 1000);

function updateTimer(){

    const now = Date.now();

    let t = ((now - cycleStart)/1000) % TOTAL;

    const el = document.getElementById("cycleTimer");

    if(t < NIGHT){
        let r = Math.ceil(NIGHT - t);
        el.innerHTML =
            `🌙 Night • ${Math.floor(r/60)}:${(r%60).toString().padStart(2,"0")}`;
    } else {
        let r = Math.ceil(TOTAL - t);
        el.innerHTML =
            `🌞 Day • ${Math.floor(r/60)}:${(r%60).toString().padStart(2,"0")}`;
    }
}

updateTimer();
setInterval(updateTimer,1000);

</script>

</body>
</html>
