<!DOCTYPE html>
<html>
<head>
    <title>GAG 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Logo -->
    <img src="root/pic/logo.png" alt="GAG 2 Logo" class="logo">

    <!-- Main text box -->
    <div class="textpanel">
        This is a Gag 2 website one of the first<br>
        it will help with everything soon<br>
        BTW here is a code<br><br>

        <strong>TEAMGREENBEAN</strong>
    </div>

    <!-- Codes button -->
    <button class="codes-button" onclick="showCodes()">
        Codes
    </button>

    <!-- Popup -->
    <div id="codesGui" class="popup">

        <button class="close-button" onclick="hideCodes()">
            X
        </button>

        <div class="popup-text">
            Placeholder line 1<br>
            Placeholder line 2<br>
            Placeholder line 3<br><br>

            <strong>EXAMPLECODE</strong>
        </div>

    </div>

    <script>
        function showCodes() {
            document.getElementById("codesGui").style.display = "block";
        }

        function hideCodes() {
            document.getElementById("codesGui").style.display = "none";
        }
    </script>

</body>
</html>
